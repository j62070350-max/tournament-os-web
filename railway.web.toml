[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.web"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
startCommand = "alembic upgrade head && uvicorn web_main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info 2>&1"

[env]
WEB_HOST = "0.0.0.0"
ENVIRONMENT = "production"
LOG_LEVEL = "INFO"
